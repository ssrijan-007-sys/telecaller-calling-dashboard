<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Pending Leads</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #2563eb, #1e3a8a, #3b82f6);
      background-size: 300% 300%;
      animation: bgShift 10s ease infinite;
      font-family: "Poppins", sans-serif;
    }
    @keyframes bgShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .glass { background: rgba(255,255,255,0.12); backdrop-filter: blur(8px); border:1px solid rgba(255,255,255,0.15); transition: transform .18s ease, box-shadow .18s ease; }
    .glass:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(0,0,0,0.18); }
    select { background: rgba(255,255,255,0.2); color: white; }
    option { color: black; }
    .modal-btn { padding: .5rem .75rem; border-radius: .375rem; }
  </style>
</head>
<body class="min-h-screen text-white">

  <nav class="flex justify-between items-center p-5 bg-white/10">
    <h1 class="text-2xl font-semibold">Pending Leads</h1>
    <div class="flex items-center gap-3">
      <button id="backDashboard" class="bg-blue-600 px-4 py-2 rounded">Dashboard</button>
      <button id="logoutBtn" class="bg-red-500 px-4 py-2 rounded">Logout</button>
    </div>
  </nav>

  <main class="p-6">
    <div class="flex justify-between items-center mb-4 gap-4">
      <h2 class="text-xl font-bold">Pending</h2>
      <div class="flex items-center gap-3">
        <input id="searchInput" class="px-3 py-2 rounded text-black w-64" placeholder="Search by name or number..." />
        <select id="filterSelect" class="px-3 py-2 rounded text-black">
          <option value="today" selected>Today</option>
          <option value="all">All</option>
          <option value="notPicked">Not Picked</option>
          <option value="remaining">Not Called / Remaining</option>
          <option value="custom">Custom Range</option>
        </select>
      </div>
    </div>

    <div id="pendingContainer" class="flex flex-col gap-6 overflow-y-auto max-h-[75vh] p-2"></div>
  </main>

  <!-- Date Range Modal -->
  <div id="dateRangeModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="bg-white text-black rounded p-6 w-80">
      <h3 class="text-lg font-semibold mb-3">Select Date Range</h3>
      <label class="text-sm">From</label>
      <input id="fromDate" type="date" class="w-full border rounded p-2 mb-3" />
      <label class="text-sm">To</label>
      <input id="toDate" type="date" class="w-full border rounded p-2 mb-4" />
      <div class="flex justify-end gap-2">
        <button id="cancelDateRange" class="bg-gray-300 px-3 py-1 rounded">Cancel</button>
        <button id="applyDateRange" class="bg-blue-600 text-white px-3 py-1 rounded">Apply</button>
      </div>
    </div>
  </div>

  <!-- Remarks Modal -->
  <div id="remarksModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="bg-white text-black rounded w-96 max-h-[70vh] overflow-y-auto p-5 relative">
      <button id="closeRemarks" class="absolute right-3 top-2 text-xl">&times;</button>
      <h3 id="remarksTitle" class="text-lg font-bold mb-3">Remarks</h3>
      <ul id="remarksList" class="space-y-2"></ul>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-60">
    <div class="bg-white text-black rounded p-6 w-80 relative">
      <h3 id="confirmTitle" class="text-lg font-semibold mb-2">Confirm</h3>
      <p id="confirmMessage" class="text-sm text-gray-700 mb-4"></p>
      <div class="flex justify-end gap-3">
        <button id="confirmCancel" class="modal-btn bg-gray-300">Cancel</button>
        <button id="confirmOk" class="modal-btn bg-red-500 text-white">Yes</button>
      </div>
    </div>
  </div>

  <!-- Message Modal -->
  <div id="messageModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-60">
    <div class="bg-white text-black rounded p-6 w-72 text-center">
      <p id="messageText" class="text-gray-800 mb-4"></p>
      <button id="messageOk" class="modal-btn bg-blue-600 text-white">OK</button>
    </div>
  </div>

  <!-- Follow-up Modal (reused from dashboard) -->
  <div id="followupModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
    <div class="bg-blue-500 rounded-xl p-6 w-96">
      <h2 class="text-lg font-semibold mb-3">Set Follow-up</h2>
      <p><strong>Number:</strong> <span id="followupNumber"></span></p>
      <p class="mb-3"><strong>Name:</strong> <span id="followupName"></span></p>
      <label class="block mb-1">Follow-up Date</label>
      <input id="followupDate" type="date" class="w-full border rounded p-2 mb-3 text-black" />
      <label class="block mb-1">Follow-up Time</label>
      <input id="followupTime" type="time" class="w-full border rounded p-2 mb-4 text-black" />
      <div class="flex justify-end gap-3">
        <button id="cancelFollowup" class="px-3 py-1 rounded bg-gray-300">Cancel</button>
        <button id="saveFollowup" class="px-3 py-1 rounded bg-green-600 text-white">Save</button>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase, ref, onValue, get, set, update, remove, push
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ---------- FIREBASE CONFIG ----------
  const firebaseConfig = {
    apiKey: "AIzaSyCaFjdwtxT13RdmVau9_6JEFBEIY1xojTY",
    authDomain: "shreejeeayucare-df742.firebaseapp.com",
    databaseURL: "https://shreejeeayucare-df742-default-rtdb.firebaseio.com",
    projectId: "shreejeeayucare-df742",
    storageBucket: "shreejeeayucare-df742.firebasestorage.app",
    messagingSenderId: "119318664445",
    appId: "1:119318664445:web:4399d3ddd4a9decc0f5a94"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // constants
  const MAX_ATTEMPTS = 2;

  // UI refs
  const pendingContainer = document.getElementById("pendingContainer");
  const searchInput = document.getElementById("searchInput");
  const filterSelect = document.getElementById("filterSelect");
  const dateRangeModal = document.getElementById("dateRangeModal");
  const fromDateEl = document.getElementById("fromDate");
  const toDateEl = document.getElementById("toDate");
  const cancelDateRange = document.getElementById("cancelDateRange");
  const applyDateRange = document.getElementById("applyDateRange");

  const remarksModal = document.getElementById("remarksModal");
  const closeRemarks = document.getElementById("closeRemarks");
  const remarksList = document.getElementById("remarksList");
  const remarksTitle = document.getElementById("remarksTitle");

  const confirmModal = document.getElementById("confirmModal");
  const confirmTitle = document.getElementById("confirmTitle");
  const confirmMessage = document.getElementById("confirmMessage");
  const confirmCancel = document.getElementById("confirmCancel");
  const confirmOk = document.getElementById("confirmOk");

  const messageModal = document.getElementById("messageModal");
  const messageText = document.getElementById("messageText");
  const messageOk = document.getElementById("messageOk");

  const followupModal = document.getElementById("followupModal");
  const followupNumber = document.getElementById("followupNumber");
  const followupName = document.getElementById("followupName");
  const followupDate = document.getElementById("followupDate");
  const followupTime = document.getElementById("followupTime");
  const cancelFollowup = document.getElementById("cancelFollowup");
  const saveFollowup = document.getElementById("saveFollowup");

  // confirm helpers
  let confirmAction = null;
  function showConfirm(title, msg, action) {
    confirmTitle.textContent = title;
    confirmMessage.textContent = msg;
    confirmModal.classList.remove("hidden");
    confirmAction = action;
  }
  confirmCancel.addEventListener("click", () => {
    confirmModal.classList.add("hidden");
    confirmAction = null;
  });
  confirmOk.addEventListener("click", async () => {
    confirmModal.classList.add("hidden");
    if (typeof confirmAction === "function") await confirmAction();
    confirmAction = null;
  });

  // message helper
  function showMessage(msg) {
    messageText.textContent = msg;
    messageModal.classList.remove("hidden");
  }
  messageOk.addEventListener("click", () => messageModal.classList.add("hidden"));

  // followup modal helpers
  let followupPayload = null;
  function openFollowupModal(number, name) {
    followupPayload = { number, name };
    followupNumber.textContent = number;
    followupName.textContent = name || "—";
    followupDate.value = "";
    followupTime.value = "";
    followupModal.classList.remove("hidden");
  }
  cancelFollowup.addEventListener("click", () => { followupModal.classList.add("hidden"); followupPayload = null; });
  saveFollowup.addEventListener("click", async () => {
    if (!followupPayload) return;
    if (!followupDate.value || !followupTime.value) return showMessage("Select both date and time.");
    try {
      const safeEmail = currentTelecaller.email.replace(/\./g, "_");
      const leadRef = ref(db, `Telecallers/${safeEmail}/Pending/${followupPayload.number}`);
      const followupRef = ref(db, `Telecallers/${safeEmail}/Followups/${followupPayload.number}`);
      const snap = await get(leadRef);
      const leadData = snap.exists() ? snap.val() : { Name: followupPayload.name, number: followupPayload.number };

      const followData = {
        ...leadData,
        Name: leadData.Name || followupPayload.name || "—",
        number: followupPayload.number,
        "Follow-Up Date": followupDate.value,
        "Follow-Up Time": followupTime.value,
        Time: leadData.Time || new Date().toISOString()
      };

      // move (WRITE then remove)
      await set(followupRef, followData);
      await set(leadRef, null);
      showMessage("Follow-up saved and lead moved.");
      followupModal.classList.add("hidden");
      followupPayload = null;
    } catch (err) {
      console.error(err);
      showMessage("Failed to save follow-up.");
    }
  });

  // Get current telecaller from localStorage (same pattern as dashboard)
  const currentTelecaller = JSON.parse(localStorage.getItem("currentTelecaller") || "null");
  if (!currentTelecaller || !currentTelecaller.email) {
    // not logged in - return to index
    window.location.href = "index.html";
  }
  const telecallerEmailKey = currentTelecaller.email.replace(/\./g, "_");

  // Firebase refs
  const pendingRef = ref(db, `Telecallers/${telecallerEmailKey}/Pending`);

  // state
  let allPending = {};

  // realtime listen
  onValue(pendingRef, snap => {
    allPending = snap.exists() ? snap.val() : {};
    renderPending();
  });

  // search & filters
  searchInput.addEventListener("input", renderPending);
  filterSelect.addEventListener("change", (e) => {
    if (e.target.value === "custom") dateRangeModal.classList.remove("hidden");
    else renderPending();
  });
  cancelDateRange.addEventListener("click", () => {
    dateRangeModal.classList.add("hidden");
    filterSelect.value = "today";
    renderPending();
  });
  applyDateRange.addEventListener("click", () => {
    dateRangeModal.classList.add("hidden");
    renderPending();
  });

  // back and logout buttons
  document.getElementById("backDashboard").addEventListener("click", () => window.location.href = "telecaller-dashboard.html");
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    // set status false similar to dashboard pattern
    await set(ref(db, `Telecallers/${telecallerEmailKey}/Status`), false);
    localStorage.removeItem("currentTelecaller");
    window.location.href = "index.html";
  });

  // Helper: parse date for grouping (use Time or RecycledAt)
  function leadDateString(lead) {
    const t = lead.Time || lead.RecycledAt || lead.RecycledAtTime || null;
    if (!t) return null;
    const d = new Date(t);
    if (isNaN(d)) return null;
    return d.toDateString();
  }

  function isInDateFilter(lead) {
    const mode = filterSelect.value;
    const now = new Date();
    if (mode === "all") return true;
    if (mode === "today") {
      const d = new Date(lead.Time || lead.RecycledAt || lead.RecycledAtTime || lead.TimeStamp || new Date().toISOString());
      return d.toDateString() === now.toDateString();
    }
    if (mode === "notPicked") return (lead.Status || "").toLowerCase() === "not picked";
    if (mode === "remaining") return (lead.Status || "").toLowerCase() === "not called";
    if (mode === "custom") {
      if (!fromDateEl.value || !toDateEl.value) return true;
      const from = new Date(fromDateEl.value + "T00:00:00");
      const to = new Date(toDateEl.value + "T23:59:59");
      const d = new Date(lead.Time || lead.RecycledAt || new Date().toISOString());
      return d >= from && d <= to;
    }
    return true;
  }

  // Render function
  function renderPending() {
    pendingContainer.innerHTML = "";
    let arr = Object.entries(allPending).map(([number, data]) => ({ number, ...data }));

    // search filter
    const q = (searchInput.value || "").toLowerCase();
    if (q) {
      arr = arr.filter(l => (l.Name || "").toLowerCase().includes(q) || String(l.number).includes(q));
    }

    // date/status filter
    arr = arr.filter(l => isInDateFilter(l));

    // group by date (dateString)
    const grouped = {};
    arr.forEach(l => {
      const key = leadDateString(l) || "Unknown";
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(l);
    });

    const sortedDates = Object.keys(grouped).sort((a, b) => {
      if (a === "Unknown") return 1;
      if (b === "Unknown") return -1;
      return new Date(b) - new Date(a);
    });

    if (sortedDates.length === 0) {
      pendingContainer.innerHTML = `<p class="text-center text-white/70 mt-10">No Pending Leads</p>`;
      return;
    }

    sortedDates.forEach(dateKey => {
      const section = document.createElement("div");
      section.innerHTML = `<h3 class="text-lg font-semibold mb-3 border-b border-white/20 pb-1">${dateKey}</h3>`;
      grouped[dateKey].sort((a,b)=> new Date(b.Time || b.RecycledAt || 0) - new Date(a.Time || a.RecycledAt || 0))
        .forEach(lead => {
          const card = document.createElement("div");
          card.className = "glass p-4 rounded-lg shadow-md mb-3";
          const attempt = lead.attempt || 0;
          const currentStatus = lead.Status || "Pending";
          card.innerHTML = `
            <div class="flex justify-between items-center mb-2">
              <div class="flex items-center gap-3">
                <h4 class="text-lg font-semibold">${lead.Name || "Unknown"}</h4>
                <button class="text-yellow-400 hover:text-yellow-300 text-sm font-semibold" data-edit="${lead.number}">✏️</button>
              </div>
              <select data-status="${lead.number}" class="rounded-md text-sm px-2 py-1 bg-white/10 text-white">
                <option ${currentStatus === "Pending" ? "selected" : ""}>Pending</option>
                <option ${currentStatus === "Picked" ? "selected" : ""}>Picked</option>
                <option ${currentStatus === "Not Picked" ? "selected" : ""}>Not Picked</option>
                <option ${currentStatus === "Ordered" ? "selected" : ""}>Ordered</option>
                <option ${currentStatus === "Not Interested" ? "selected" : ""}>Not Interested</option>
                <option ${currentStatus === "Follow-up" ? "selected" : ""}>Follow-up</option>
              </select>
            </div>

            <p><strong>Number:</strong> ${lead.number}</p>
            <p><strong>Problem:</strong> ${lead.Problem || "—"}</p>
            <p><strong>Time:</strong> ${new Date(lead.Time).toLocaleTimeString()}</p>
            <p class="text-sm text-yellow-200 mt-1">Original: ${lead.OriginalTelecallerName || "-"}</p>
            <p class="text-sm text-yellow-200">Recycled From: ${lead.RecycledFromName || "-"}</p>
            <p class="text-sm text-yellow-200">Recycle Count: ${lead.recycledCount || 0}</p>

            <input type="text" placeholder="Add a remark..." data-remark="${lead.number}" class="w-full mt-2 bg-white/10 border border-white/30 rounded px-3 py-2 text-white placeholder-white/70" />

            ${attempt > 0 && attempt <= MAX_ATTEMPTS ? `<button class="bg-purple-500 mt-2 px-3 py-1 rounded attemptBtn" data-number="${lead.number}" data-attempt="${attempt}">📞 Call Again (${attempt}/${MAX_ATTEMPTS})</button>` : ""}

            <div class="flex justify-end mt-2 gap-2">
              <button data-view="${lead.number}" class="bg-blue-500 px-3 py-1 rounded text-sm">View</button>
              <button class="bg-yellow-400 hover:bg-yellow-500 text-white px-3 py-1 rounded followupBtn" data-number="${lead.number}" data-name="${lead.Name || ''}">Follow-up</button>
            </div>
          `;

          // attach event listeners for this card

          // status change
          const sel = card.querySelector(`[data-status="${lead.number}"]`);
          sel.addEventListener("change", async (e) => {
            const newStatus = e.target.value;
            const pendRef = ref(db, `Telecallers/${telecallerEmailKey}/Pending/${lead.number}`);
            const leadsRef = ref(db, `Telecallers/${telecallerEmailKey}/Leads/${lead.number}`);
            const orderedRef = ref(db, `Telecallers/${telecallerEmailKey}/Ordered/${lead.number}`);
            const followupsRef = ref(db, `Telecallers/${telecallerEmailKey}/Followups/${lead.number}`);

            // Not Picked behaviour: increment attempt
            if (newStatus === "Not Picked") {
              e.target.value = currentStatus; // revert visually until we handle
              const newAttempt = (lead.attempt || 0) + 1;
              await update(pendRef, { attempt: newAttempt, Status: "Not Picked" });
              showMessage(`Attempt ${newAttempt} recorded. Use Call Again button to increase attempts or it will be moved after ${MAX_ATTEMPTS} attempts.`);
              // if reached max, ask to move to NotPicked permanently under original telecaller or current
              if (newAttempt >= MAX_ATTEMPTS) {
                showConfirm(

"Move to NotPicked",
"Maximum attempts reached. Move to NotPicked?",
async () => {

const snap = await get(pendRef);

if (!snap.exists()) {
showMessage("Lead disappeared.");
return;
}

const data = snap.val();

const notPickedPath = `Telecallers/${telecallerEmailKey}/NotPicked/${number}`;
console.log("Moving lead to:", notPickedPath);

const notPickedRef = ref(db, notPickedPath);

await set(notPickedRef,{
...data,
Status:"Not Picked",
MovedAt:new Date().toISOString(),
attempt:0
});

console.log("Lead written successfully");

await remove(pendRef);

showMessage("Lead moved to NotPicked.");

}
);
              }
              return;
            }

            // Picked -> move to Leads under current telecaller
            if (newStatus === "Picked") {
              e.target.value = currentStatus;
              showConfirm("Mark as Picked", "Move this lead back to your Leads list?", async () => {
                const snap = await get(pendRef);
                if (!snap.exists()) return showMessage("Lead no longer exists.");
                const data = snap.val();
                await set(leadsRef, { ...data, Status: "Picked", Time: data.Time || new Date().toISOString() });
                await remove(pendRef);
                showMessage("Lead moved back to your Leads.");
              });
              return;
            }

            // Ordered -> move to Ordered
            if (newStatus === "Ordered") {
              e.target.value = currentStatus;
              showConfirm("Mark as Ordered", "Move this lead to Ordered?", async () => {
                const snap = await get(pendRef);
                if (!snap.exists()) return showMessage("Lead no longer exists.");
                const data = snap.val();
                const now = new Date();
                await set(orderedRef, { ...data, "Order Date": now.toISOString().split("T")[0], "Order Time": now.toTimeString().slice(0,5), Status: "Ordered" });
                await remove(pendRef);
                showMessage("Lead moved to Ordered.");
              });
              return;
            }

            // Not Interested -> delete
            if (newStatus === "Not Interested") {
              e.target.value = currentStatus;
              showConfirm("Delete lead", "This will permanently delete the lead. Continue?", async () => {
                await remove(pendRef);
                showMessage("Lead deleted.");
              });
              return;
            }

            // Follow-up -> move to Followups
            if (newStatus === "Follow-up") {
              e.target.value = currentStatus;
              openFollowupModal(lead.number, lead.Name);
              return;
            }
          });

          // attempt button handler (call again)
          const attemptBtn = card.querySelector(".attemptBtn");
          if (attemptBtn) {
            attemptBtn.addEventListener("click", async () => {

console.log("Attempt button clicked");

const number = attemptBtn.dataset.number;
const attempt = parseInt(attemptBtn.dataset.attempt);

console.log("Number:", number);
console.log("Attempt:", attempt);

const pendRef = ref(
db,
`Telecallers/${telecallerEmailKey}/Pending/${number}`
);

if (attempt + 1 < MAX_ATTEMPTS) {

const newAttempt = attempt + 1;

await update(pendRef,{
attempt: newAttempt,
Status: "Not Called"
});

showMessage(`Attempt ${newAttempt} recorded. Try calling again.`);

} else {

showConfirm(
"Move to NotPicked",
"Maximum attempts reached. Move lead to NotPicked?",
async () => {

const snap = await get(pendRef);

if(!snap.exists()){
showMessage("Lead not found.");
return;
}

const data = snap.val();

const notPickedRef = ref(
db,
`Telecallers/${telecallerEmailKey}/NotPicked/${number}`
);

await set(notPickedRef,{
...data,
Status:"Not Picked",
MovedAt:new Date().toISOString(),
attempt:0
});

await remove(pendRef);

showMessage("Lead moved to NotPicked.");

}
);

}

});
          }

          // edit name
          card.querySelector(`[data-edit="${lead.number}"]`).addEventListener("click", async () => {
            const newName = prompt("Edit Lead Name:", lead.Name || "");
            if (!newName) return;
            const pendRef = ref(db, `Telecallers/${telecallerEmailKey}/Pending/${lead.number}`);
            await update(pendRef, { Name: newName });
            showMessage("Name updated.");
          });

          // add remark
          const remarkInput = card.querySelector(`[data-remark="${lead.number}"]`);
          remarkInput.addEventListener("keypress", async (e) => {
            if (e.key !== "Enter") return;
            const txt = e.target.value.trim();
            if (!txt) return;
            const remarkRef = ref(db, `Telecallers/${telecallerEmailKey}/Pending/${lead.number}/Remarks`);
            await set(push(remarkRef), { text: txt, time: new Date().toISOString() });
            e.target.value = "";
          });

          // view remarks
          card.querySelector(`[data-view="${lead.number}"]`).addEventListener("click", () => openRemarks(lead.number, lead.Name));

          // followup button (open followup modal)
          const fbtn = card.querySelector(".followupBtn");
          if (fbtn) {
            fbtn.addEventListener("click", () => openFollowupModal(fbtn.dataset.number, fbtn.dataset.name));
          }

          section.appendChild(card);
        });
      pendingContainer.appendChild(section);
    });
  }

  // remarks modal open
  async function openRemarks(number, name) {
    remarksTitle.textContent = `Remarks for ${name || "—"} (${number})`;
    remarksList.innerHTML = `<li class="text-gray-500 text-center">Loading...</li>`;
    remarksModal.classList.remove("hidden");
    const rref = ref(db, `Telecallers/${telecallerEmailKey}/Pending/${number}/Remarks`);
    onValue(rref, snap => {
      if (!snap.exists()) {
        remarksList.innerHTML = `<li class="text-gray-500 text-center">No remarks yet.</li>`;
        return;
      }
      const arr = Object.values(snap.val()).sort((a,b)=> new Date(b.time)-new Date(a.time));
      remarksList.innerHTML = arr.map(r => `<li class="bg-gray-100 p-2 rounded mb-2"><p>${r.text}</p><p class="text-xs text-gray-500">${new Date(r.time).toLocaleString()}</p></li>`).join("");
    });
  }
  closeRemarks.addEventListener("click", () => remarksModal.classList.add("hidden"));

  // initial render (if there are pending)
  renderPending();

</script>
</body>
</html>
